services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: art-gallery-app
    ports:
      - '8000:8000'
    volumes:
      - ./:/app
      - /app/vendor
      - /app/public/build
      - /app/public/vendor
      - /app/storage/framework/views
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: '${POSTGRES_DB:-gallery}'
      DB_USERNAME: '${POSTGRES_USER:-postgres}'
      DB_PASSWORD: '${POSTGRES_PASSWORD:-secret}'
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379

  postgres:
    image: postgres:16-alpine
    container_name: art-gallery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-gallery}'
      POSTGRES_USER: '${POSTGRES_USER:-postgres}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-secret}'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"' ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: art-gallery-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
